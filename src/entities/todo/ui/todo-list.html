<ul class="todo-list" data-layer="entities" data-entity="todo" aria-label="タスク一覧">
  <li class="todo-item" data-entity="todo" data-todo-id="sample-1" data-status="active">
    <label class="todo-item__check">
      <input type="checkbox" name="completed" data-feature="toggle-todo" />
      <span class="todo-item__title">FSDのレイヤーを確認する</span>
    </label>
    <span class="todo-item__meta">
      <time datetime="2026-07-08">7/8</time>
      <span data-priority="high">高い</span>
    </span>
    <div class="todo-item__actions" aria-label="タスク操作">
      <button class="button" type="button" data-feature="edit-todo">編集</button>
      <button class="button" type="button" data-feature="delete-todo">削除</button>
    </div>
  </li>

  <li class="todo-item" data-entity="todo" data-todo-id="sample-2" data-status="completed">
    <label class="todo-item__check">
      <input type="checkbox" name="completed" data-feature="toggle-todo" checked />
      <span class="todo-item__title">画面HTMLを読み込む</span>
    </label>
    <span class="todo-item__meta">
      <time datetime="2026-07-07">7/7</time>
      <span data-priority="normal">通常</span>
    </span>
    <div class="todo-item__actions" aria-label="タスク操作">
      <button class="button" type="button" data-feature="edit-todo">編集</button>
      <button class="button" type="button" data-feature="delete-todo">削除</button>
    </div>
  </li>
</ul>
